
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FlowPilot AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#2563EB;--pd:#1D4ED8;--pl:#EFF6FF;--pm:#BFDBFE;
  --ac:#06B6D4;--su:#10B981;--wa:#F59E0B;--da:#EF4444;
  --tx:#0F172A;--tm:#475569;--tl:#94A3B8;
  --bo:#E2E8F0;--bg:#F8FAFC;--su2:#fff;
}
body,#root{font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--tx);background:var(--bg);min-height:100vh}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
a{text-decoration:none}
.btn-p{background:var(--p);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s,transform .12s}
.btn-p:hover{background:var(--pd);transform:translateY(-1px)}
.btn-o{background:transparent;color:var(--tx);border:1px solid var(--bo);padding:9px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-o:hover{border-color:var(--p);color:var(--p);background:var(--pl)}
.btn-g{background:transparent;color:var(--tm);border:none;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:color .15s}
.btn-g:hover{color:var(--tx)}
.card{background:#fff;border:1px solid var(--bo);border-radius:12px;padding:20px 22px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.badge-p{background:var(--pl);color:var(--p)}
.badge-s{background:#D1FAE5;color:var(--su)}
.badge-w{background:#FEF3C7;color:var(--wa)}
.badge-d{background:#FEE2E2;color:var(--da)}
.nav{background:#fff;border-bottom:1px solid var(--bo);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:17px;cursor:pointer}
.nav-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--p),var(--ac));border-radius:8px;display:flex;align-items:center;justify-content:center}
.sidebar{width:200px;background:#fff;border-right:1px solid var(--bo);padding:16px 0;display:flex;flex-direction:column;min-height:calc(100vh - 60px);flex-shrink:0}
.side-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13.5px;font-weight:500;cursor:pointer;color:var(--tm);transition:all .15s}
.side-item:hover{background:#F8FAFC;color:var(--tx)}
.side-active{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--p);background:var(--pl);border-right:2px solid var(--p)}
.stat-card{background:#fff;border:1px solid var(--bo);border-radius:12px;padding:18px 20px;flex:1}
.page-anim{animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.toggle{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none;padding:0}
.toggle-knob{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input[type=text],input[type=email],input[type=password],input[type=search]{outline:none;border:1px solid var(--bo);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--tx);width:100%;transition:border-color .15s}
input:focus{border-color:var(--p)}
</style>

<body>

<div id="app"></div>

<script>
const C={p:"#2563EB",pd:"#1D4ED8",pl:"#EFF6FF",pm:"#BFDBFE",ac:"#06B6D4",su:"#10B981",wa:"#F59E0B",da:"#EF4444",tx:"#0F172A",tm:"#475569",tl:"#94A3B8",bo:"#E2E8F0",bg:"#F8FAFC"};

let state={
  page:"home",obStep:0,bizType:null,tone:"professional",connected:false,tpl:0,bizName:"",autoOn:true,sideActive:"dashboard",search:"",
  token:localStorage.getItem("flowpilot_token")||"",user:null,dashboard:null,templates:[],loading:false,error:""
};

function setState(updates){Object.assign(state,updates);render();}

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
}

async function api(path,options={}){
  const headers={"Content-Type":"application/json",...(options.headers||{})};
  if(state.token) headers.Authorization=`Bearer ${state.token}`;
  const res=await fetch(path,{...options,headers});
  const body=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(body.error||`Request failed: ${res.status}`);
  return body;
}

async function createAccount(){
  const name=document.getElementById("signup-name")?.value.trim();
  const email=document.getElementById("signup-email")?.value.trim();
  const password=document.getElementById("signup-password")?.value;
  if(!name||!email||!password) return setState({error:"Please enter your name, email, and password."});
  try{
    setState({loading:true,error:""});
    const data=await api("/api/auth/signup",{method:"POST",body:JSON.stringify({name,email,password})});
    localStorage.setItem("flowpilot_token",data.token);
    setState({token:data.token,user:data.user,loading:false,obStep:1});
  }catch(err){setState({loading:false,error:err.message});}
}

async function saveBusiness(){
  const type=state.bizType!==null?BIZ[state.bizType].l.toLowerCase().replace(/\s+/g,"_"):"other";
  try{
    setState({loading:true,error:""});
    await api("/api/onboarding/business",{method:"POST",body:JSON.stringify({name:state.bizName||"My Business",type,tone:state.tone})});
    setState({loading:false,obStep:2});
  }catch(err){setState({loading:false,error:err.message});}
}

async function connectIntegration(provider){
  try{
    setState({loading:true,error:""});
    await api(`/api/integrations/${provider}/connect`,{method:"POST",body:JSON.stringify({})});
    setState({loading:false,connected:true});
  }catch(err){setState({loading:false,error:err.message});}
}

async function loadTemplates(){
  try{
    const data=await api(`/api/templates?q=${encodeURIComponent(state.search)}`);
    setState({templates:data.templates});
  }catch(err){setState({error:err.message});}
}

async function activateTemplate(templateId){
  const fallback=["tpl_lead_follow_up","tpl_invoice_reminder","tpl_support_triage"];
  try{
    setState({loading:true,error:""});
    await api("/api/workflows/from-template",{method:"POST",body:JSON.stringify({templateId:templateId||fallback[state.tpl]||fallback[0]})});
    setState({loading:false,obStep:4,dashboard:null});
  }catch(err){setState({loading:false,error:err.message});}
}

async function loadDashboard(){
  if(!state.token) return;
  try{
    setState({loading:true,error:""});
    const dashboard=await api("/api/dashboard");
    setState({dashboard,user:dashboard.user,loading:false});
  }catch(err){setState({loading:false,error:err.message,page:"signup",obStep:0});}
}

function goDashboard(){
  setState({page:"dashboard",sideActive:"dashboard"});
  loadDashboard();
}

async function togglePrimaryWorkflow(){
  const workflow=state.dashboard?.workflows?.[0];
  if(!workflow) return setState({autoOn:!state.autoOn});
  const status=workflow.status==="active"?"paused":"active";
  try{
    const data=await api(`/api/workflows/${workflow.id}`,{method:"PATCH",body:JSON.stringify({status})});
    const dashboard={...state.dashboard,workflows:[data.workflow,...state.dashboard.workflows.slice(1)]};
    setState({dashboard,autoOn:status==="active"});
  }catch(err){setState({error:err.message});}
}

function useTemplate(templateId){
  setState({page:"signup",obStep:3,tpl:0});
  if(templateId) activateTemplate(templateId);
}

}

function sidebar(active){
  const items=SIDE_ITEMS.map(it=>{
    const cls=active===it.key?'side-active':'side-item';
    const clk=it.page?`setState({page:'${it.page}',sideActive:'${it.key}'})`:`setState({sideActive:'${it.key}'})`;
    return `<div class="${cls}" onclick="${clk}">${svg(it.icon,16,active===it.key?C.p:C.tm)}${it.label}</div>`;
  }).join('');
  return `<div class="sidebar">
    <div style="padding:0 18px 14px;border-bottom:1px solid ${C.bo};margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700">

  </div>`;
}

              <div style="width:44px;height:44px;border-radius:10px;background:${t.bg};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${t.ic}</div>
              <div style="flex:1">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                  <span style="font-size:15px;font-weight:700">${escapeHtml(t.title)}</span>
                  ${t.tag?`<span class="badge badge-p">${t.tag}</span>`:''}
                </div>
                <p style="font-size:12.5px;color:${C.tm};margin:0 0 12px;line-height:1.5">${escapeHtml(t.desc)}</p>
                <button class="btn-o" style="padding:7px 14px;font-size:12.5px" onclick="${state.token&&t.id?`activateTemplate('${t.id}')`:`setState({page:'signup',obStep:0})`}">Use Template ${svg(I.arrow,13,'currentColor')}</button>
              </div>
            </div>`).join('')}
        </div>
        ${filtered.length===0?`<div style="text-align:center;padding:60px 24px;color:${C.tl}"><div style="font-size:36px;margin-bottom:12px">ðŸ”</div><div style="font-size:15px;font-weight:600;color:${C.tm}">No templates found for "${state.search}"</div></div>`:''}
        <div style="text-align:center;margin-top:28px">
          <span style="font-size:13.5px;color:${C.p};font-weight:600;cursor:pointer">Browse all templates â†’</span>
        </div>
      </div>
    </div>
  </div>`;
}

function render(){
  const app=document.getElementById('app');
  if(state.page==='home')      app.innerHTML=homePage();
  else if(state.page==='signup')    app.innerHTML=signupPage();
  else if(state.page==='dashboard') app.innerHTML=dashPage();
  else if(state.page==='templates') app.innerHTML=templatesPage();
}

render();
</script>
</body>
</html>
